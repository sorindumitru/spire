server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "domain.test"
    data_dir = "/opt/spire/data/server"
    log_level = "DEBUG"
    ca_ttl = "1h"
    default_x509_svid_ttl = "10m"
    default_jwt_svid_ttl = "10m"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "postgres"
            connection_string = "dbname=postgres user=postgres password=password host=postgres sslmode=disable"
        }
    }
    NodeAttestor "x509pop" {
        plugin_data {
            ca_bundle_path = "/opt/spire/conf/server/agent-cacert.pem"
        }
    }
    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }
    # Shared root CA mounted into both servers so their SVIDs chain to the same
    # root; combined with the shared datastore this makes either server able to
    # serve the agent after failover.
    UpstreamAuthority "disk" {
        plugin_data {
            key_file_path = "/opt/spire/conf/upstream/root.key"
            cert_file_path = "/opt/spire/conf/upstream/root.crt"
        }
    }
}
