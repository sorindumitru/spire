agent {
    data_dir = "/opt/spire/data/agent"
    log_level = "DEBUG"

    # In xDS mode, server_address is the xDS listener name (not a host:port),
    # and server_port is ignored. The agent dials "xds:///spire-server" and the
    # xDS management server (see GRPC_XDS_BOOTSTRAP) supplies the actual server
    # endpoints and the locality/priority-based failover policy.
    server_address = "spire-server"
    server_port = "8081"

    socket_path = "/opt/spire/sockets/workload_api.sock"
    trust_bundle_path = "/opt/spire/conf/agent/bootstrap.crt"
    trust_domain = "domain.test"

    experimental {
        server_resolver = "xds"
    }
}

plugins {
    NodeAttestor "x509pop" {
        plugin_data {
            private_key_path = "/opt/spire/conf/agent/agent.key.pem"
            certificate_path = "/opt/spire/conf/agent/agent.crt.pem"
        }
    }
    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data/agent"
        }
    }
    WorkloadAttestor "unix" {
        plugin_data {
        }
    }
}
